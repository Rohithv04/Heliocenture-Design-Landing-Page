<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — HelioCenture</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-accent: #E4572E;
            --color-bg: #F8F8F6;
            --color-text: #111;
            --color-text-muted: #6B6B6B;
            --font-body: 'Satoshi', sans-serif;
            --font-display: 'Instrument Serif', serif;
        }
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 480px;
            padding: 2rem;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: color-mix(in srgb, var(--color-accent) 12%, transparent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        h1 {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: var(--color-accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }

        /* === WHATSAPP FLOATING BUTTON === */
        .floating-whatsapp {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.06);
            z-index: 1000;
            transition: transform 300ms cubic-bezier(.16, 1, .3, 1), background-color 200ms ease, box-shadow 200ms ease;
            text-decoration: none;
        }

        .floating-whatsapp:hover {
            transform: translateY(-4px) scale(1.05);
            background-color: #128C7E;
            box-shadow: 0 16px 32px rgba(37, 211, 102, 0.3);
            color: #fff;
        }

        .floating-whatsapp svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* === PHONE FLOATING BUTTON === */
        .floating-phone {
            position: fixed;
            bottom: calc(2rem + 60px + 0.75rem);
            right: 2rem;
            width: 60px;
            height: 60px;
            background-color: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.06);
            z-index: 1000;
            transition: transform 300ms cubic-bezier(.16, 1, .3, 1), background-color 200ms ease, box-shadow 200ms ease;
            text-decoration: none;
        }

        .floating-phone:hover {
            transform: translateY(-4px) scale(1.05);
            background-color: #C93D15;
            box-shadow: 0 16px 32px rgba(228, 87, 46, 0.3);
            color: #fff;
        }

        .floating-phone svg {
            width: 28px;
            height: 28px;
        }

        @media (max-width: 640px) {
            .floating-whatsapp {
                bottom: 1rem;
                right: 1rem;
                width: 52px;
                height: 52px;
            }
            .floating-whatsapp svg {
                width: 28px;
                height: 28px;
            }
            .floating-phone {
                bottom: calc(1rem + 52px + 0.5rem);
                right: 1rem;
                width: 52px;
                height: 52px;
            }
            .floating-phone svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Thank You!</h1>
        <p>We've received your inquiry and our team will get back to you within 24 hours to discuss your project.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>

</body>
</html>
