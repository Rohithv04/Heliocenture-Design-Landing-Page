<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — HelioCenture</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-accent: #E4572E;
            --color-bg: #F8F8F6;
            --color-text: #111;
            --color-text-muted: #6B6B6B;
            --font-body: 'Satoshi', sans-serif;
            --font-display: 'Instrument Serif', serif;
        }
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 480px;
            padding: 2rem;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: color-mix(in srgb, var(--color-accent) 12%, transparent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        h1 {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: var(--color-accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Thank You!</h1>
        <p>We've received your inquiry and our team will get back to you within 24 hours to discuss your project.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>
</html>
