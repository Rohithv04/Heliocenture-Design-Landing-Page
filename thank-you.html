    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-accent: #E4572E;
            --color-accent-hover: #C93D15;
            --color-bg: #F8F8F6;
            --color-surface: #F2F2EF;
            --color-surface-2: #EAEAE7;
            --color-text: #111;
            --color-text-muted: #6B6B6B;
            --color-border: #E5E5E5;
            --font-body: 'Satoshi', 'Inter', sans-serif;
            --font-display: 'Instrument Serif', Georgia, serif;
            
            --space-1: .25rem;
            --space-2: .5rem;
            --space-3: .75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --space-20: 5rem;
            --space-24: 6rem;
            
            --radius-sm: .375rem;
            --radius-md: .5rem;
            --radius-lg: .75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, .08), 0 2px 4px rgba(0, 0, 0, .05);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, .10), 0 4px 8px rgba(0, 0, 0, .06);
            --ease-spring: cubic-bezier(.16, 1, .3, 1);
            --transition: 200ms var(--ease-spring);
        }
        
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding-top: 80px; /* Space for the fixed navbar */
        }

        .container {
            max-width: 480px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: color-mix(in srgb, var(--color-accent) 12%, transparent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }
        
        h1 {
            font-family: var(--font-display);
            font-style: italic;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        p {
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            background: var(--color-accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease, background-color var(--transition);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            background: var(--color-accent-hover);
        }

        /* === NAVBAR === */
        .navbar {
            position: fixed;
            top: var(--space-4);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: color-mix(in srgb, var(--color-bg) 90%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--color-border);
            padding: 6px 6px 6px 20px;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            max-width: 720px;
            width: calc(100% - var(--space-8));
        }

        .navbar__logo {
            display: flex;
            align-items: center;
            padding-left: 0;
        }

        .navbar__logo img {
            height: 22px;
            width: auto;
            object-fit: contain;
        }

        .navbar__links {
            display: flex;
            align-items: center;
            gap: var(--space-1);
            margin-left: auto;
        }

        .navbar__links a {
            font-size: var(--text-sm);
            font-weight: 500;
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            transition: background var(--transition);
            white-space: nowrap;
        }

        .navbar__links a:hover {
            background: var(--color-surface);
        }

        .navbar__links a:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .navbar__cta {
            margin-left: var(--space-2);
            white-space: nowrap;
            flex-shrink: 0;
            padding: 8px 16px;
            min-height: auto;
            font-size: 0.875rem;
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--color-accent);
            color: #fff;
            font-weight: 500;
            border: none;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
        }

        .navbar__cta:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .navbar__hamburger {
            display: none;
            background: none;
            border: none;
            padding: var(--space-2);
            color: var(--color-text);
            width: 40px;
            height: 40px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
            margin-left: auto;
        }

        .navbar__hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background-color: currentColor;
            border-radius: 2px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar__hamburger.is-active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .navbar__hamburger.is-active span:nth-child(2) {
            opacity: 0;
            transform: translateX(-10px);
        }

        .navbar__hamburger.is-active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        .mobile-drawer {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99;
            background: color-mix(in srgb, var(--color-bg) 97%, transparent);
            backdrop-filter: blur(20px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-6);
        }

        .mobile-drawer.open {
            display: flex;
        }

        .mobile-drawer a {
            font-size: var(--text-lg);
            font-weight: 500;
            padding: var(--space-3);
        }

        .mobile-drawer .btn-primary {
            margin-top: var(--space-4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--color-accent);
            color: #fff;
            border-radius: var(--radius-lg);
            padding: var(--space-3) var(--space-6);
            font-size: var(--text-sm);
            font-weight: 500;
            border: none;
            transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
            min-height: 44px;
        }

        @media(max-width:768px) {
            .navbar {
                padding: 6px 12px 6px 20px;
            }

            .navbar__links,
            .navbar__cta {
                display: none;
            }

            .navbar__hamburger {
                display: flex;
                margin-right: -4px;
            }
        }

        /* === WHATSAPP FLOATING BUTTON === */
        .floating-whatsapp {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.06);
            z-index: 1000;
            transition: transform 300ms cubic-bezier(.16, 1, .3, 1), background-color 200ms ease, box-shadow 200ms ease;
            text-decoration: none;
        }

        .floating-whatsapp:hover {
            transform: translateY(-4px) scale(1.05);
            background-color: #128C7E;
            box-shadow: 0 16px 32px rgba(37, 211, 102, 0.3);
            color: #fff;
        }

        .floating-whatsapp svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* === PHONE FLOATING BUTTON === */
        .floating-phone {
            position: fixed;
            bottom: calc(2rem + 60px + 0.75rem);
            right: 2rem;
            width: 60px;
            height: 60px;
            background-color: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1), 0 4px 8px rgba(0, 0, 0, 0.06);
            z-index: 1000;
            transition: transform 300ms cubic-bezier(.16, 1, .3, 1), background-color 200ms ease, box-shadow 200ms ease;
            text-decoration: none;
        }

        .floating-phone:hover {
            transform: translateY(-4px) scale(1.05);
            background-color: #C93D15;
            box-shadow: 0 16px 32px rgba(228, 87, 46, 0.3);
            color: #fff;
        }

        .floating-phone svg {
            width: 28px;
            height: 28px;
        }

        @media (max-width: 640px) {
            .floating-whatsapp {
                bottom: 1rem;
                right: 1rem;
                width: 52px;
                height: 52px;
            }
            .floating-whatsapp svg {
                width: 28px;
                height: 28px;
            }
            .floating-phone {
                bottom: calc(1rem + 52px + 0.5rem);
                right: 1rem;
                width: 52px;
                height: 52px;
            }
            .floating-phone svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>

    <script>
        function toggleMenu() {
            const btn = document.getElementById('hamburger-btn');
            const drawer = document.getElementById('drawer');
            const isOpen = drawer.classList.toggle('open');
            btn.classList.toggle('is-active', isOpen);
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }

        function closeMenu() {
            const btn = document.getElementById('hamburger-btn');
            const drawer = document.getElementById('drawer');
            drawer.classList.remove('open');
            btn.classList.remove('is-active');
            document.body.style.overflow = '';
        }

        // Dynamically update the WhatsApp link if waUrl is passed in query parameters
        (function() {
            const params = new URLSearchParams(window.location.search);
            const waUrlParam = params.get('waUrl');
            if (waUrlParam) {
                const waBtn = document.getElementById('wa-btn');
                if (waBtn) {
                    waBtn.href = waUrlParam;
                }
            }
        })();
    </script>
